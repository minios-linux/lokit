# yaml-language-server: $schema=./lokit.schema.json

source_lang: en
languages:
  - ar
  - de
  - es
  - fr
  - it
  - ja
  - ko
  - pl
  - pt-BR
  - ru
  - tr
  - uk
  - zh-CN

targets:
  - name: lokit
    format: gettext
    root: .
    dir: po
    pot: lokit.pot
    sources:
      - .
    keywords:
      - T
      - "N:1,2"
